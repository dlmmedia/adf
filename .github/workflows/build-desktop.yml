name: Release Desktop App

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0)"
        required: false
        type: string

permissions:
  contents: write

env:
  GITHUB_REPO: dlmmedia/adf

jobs:
  # -------------------------------------------------------------------
  # Sync the pushed tag version into all manifest files
  # -------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Sync version into manifests
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' \
            desktop/frontend/src-tauri/tauri.conf.json > tmp.json && mv tmp.json desktop/frontend/src-tauri/tauri.conf.json

          # package.json
          jq --arg v "$VERSION" '.version = $v' \
            desktop/frontend/package.json > tmp.json && mv tmp.json desktop/frontend/package.json

          # Cargo.toml — update version line
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" desktop/frontend/src-tauri/Cargo.toml

          echo "Synced version $VERSION into all manifests"

      - name: Upload synced source
        uses: actions/upload-artifact@v4
        with:
          name: synced-source
          path: .
          retention-days: 1

  # -------------------------------------------------------------------
  # Build desktop binaries for each platform (unsigned macOS)
  # -------------------------------------------------------------------
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Download synced source
        uses: actions/download-artifact@v4
        with:
          name: synced-source

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/frontend/src-tauri -> target

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci
        working-directory: desktop/frontend

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop/frontend
          tagName: v__VERSION__
          releaseName: "DLM ADF v__VERSION__"
          releaseBody: |
            ## DLM ADF v${{ needs.prepare.outputs.version }}

            Download the DLM ADF desktop application for your platform.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows (64-bit) | `.msi` / `.exe` |
            | macOS (Apple Silicon) | `.dmg` (unsigned) |
            | macOS (Intel) | `.dmg` (unsigned) |
            | Linux (Debian/Ubuntu) | `.deb` |
            | Linux (Fedora/RHEL) | `.rpm` |

            > **macOS note:** The app is not code-signed. On first launch, right-click the app and select "Open", then confirm in the dialog. Alternatively run: `xattr -cr /Applications/DLM\ ADF.app`

            ### What's New
            See the [full changelog](https://github.com/dlmmedia/adf/compare/v${{ needs.prepare.outputs.version }}...main) for details.

            ---
            *Built by [GenTech](https://dlmworld.com) — DLM ADF: Agent Document Format*
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonKeepUniversal: true
          args: ${{ matrix.args }}

  # -------------------------------------------------------------------
  # Publish the updater manifest to the release
  # -------------------------------------------------------------------
  publish-update-manifest:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create update endpoint JSON
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          BASE="https://github.com/dlmmedia/adf/releases/download/v$VERSION"

          cat > latest.json << MANIFEST
          {
            "version": "$VERSION",
            "notes": "DLM ADF v$VERSION is available. Visit https://dlmworld.com/releases for details.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "url": "$BASE/DLM.ADF_${VERSION}_aarch64.dmg",
                "signature": ""
              },
              "darwin-x86_64": {
                "url": "$BASE/DLM.ADF_${VERSION}_x64.dmg",
                "signature": ""
              },
              "linux-x86_64": {
                "url": "$BASE/dlm-adf_${VERSION}_amd64.deb",
                "signature": ""
              },
              "windows-x86_64": {
                "url": "$BASE/DLM.ADF_${VERSION}_x64-setup.exe",
                "signature": ""
              }
            }
          }
          MANIFEST

          echo "Generated latest.json for v$VERSION"
          cat latest.json

      - name: Upload manifest to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          gh release upload "v$VERSION" latest.json --clobber --repo dlmmedia/adf

  # -------------------------------------------------------------------
  # Tests (run in parallel with build)
  # -------------------------------------------------------------------
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Lint with ruff
        run: pip install ruff && ruff check .
        working-directory: backend

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: desktop/frontend

      - name: Typecheck
        run: npm run typecheck
        working-directory: desktop/frontend

      - name: Lint
        run: npm run lint:eslint
        working-directory: desktop/frontend

      - name: Build
        run: npm run build
        working-directory: desktop/frontend
